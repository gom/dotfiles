color_scheme = "tokyo night"

[mcp_servers]

[mcp_servers.drawio]
serverUrl = "https://mcp.draw.io/mcp"

[mcp_servers.github]
args = ["stdio"]
command = "/usr/local/bin/github-mcp-server"

[mcp_servers.github.env]
GITHUB_PERSONAL_ACCESS_TOKEN = "$GITHUB_TOKEN"

[mcp_servers.serena]
args = ["--from", "git+https://github.com/oraios/serena", "serena", "start-mcp-server", "--context", "claude-code", "--project-from-cwd"]
command = "uvx"

[mcp_servers.tavily]
serverUrl = "https://mcp.tavily.com/mcp/?tavilyApiKey=$TAVILY_API_KEY"

[permissions]
allow = ["command(ls)", "command(cat)", "command(git status)", "command(git log)", "command(docker compose)", "command(mkdir)", "command(pwd)", "command(find)", "command(git rev-parse)", "command(git remote)", "command(diff)", "command(date)", "command(echo)"]
ask = ["command(git commit)", "command(git push)"]
