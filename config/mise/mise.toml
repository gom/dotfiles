[tools]
# --- Core Utilities ---
# ls
eza = "latest"
# cat
bat = "latest"
# grep
ripgrep = "latest"
# find
fd = "latest"
# cd
zoxide = "latest"
# top
"github:dalance/procs" = "latest"
# du
dust = "latest"
neovim = "latest"

# --- Text Processing & JSON ---
# fuzzy finder
fzf = "latest"
# JSON
jq = "latest"
# Git diff
delta = "latest"
# Git TUI
lazygit = "latest"

# --- Environment & Shell Managers ---
# shell history
atuin = { version = "latest", postinstall = "atuin import auto" }
# shell plugin manager
"github:rossmacarthur/sheldon" = "latest"
starship = "latest"

# --- Languages ---
node = "latest"
python = "latest"
go = "latest"
usage = "latest"
uv = "latest"
# rust = "latest" # use rustup instead.

# --- AI Tools ---
"github:ogulcancelik/herdr" = "latest"
claude-code  = "latest"
codex        = "latest"
copilot-cli  = "latest"
opencode     = "latest"
"bun:context-mode" = "latest"
"uv:serena" = "latest"
"cargo:lean-ctx" = "latest"

[env]
STARSHIP_CONFIG = '{{env.HOME}}/.config/starship/starship.toml'

[settings]
# 開発機能の有効化（推奨）
experimental = true
# ツールインストール時の詳細表示
verbose = false
# asdfのプラグインショートカットを使用
plugin_autoupdate_last_check_duration = "1 week"

[tasks."agents:setup"]
description = "Fetch routing rules and run platform plugin installations for AI agents"
run = """
#!/usr/bin/env bash
echo "📥 Downloading routing rules (AGENTS.md & GEMINI.md)..."
mkdir -p ~/.codex ~/.gemini
curl -sL https://raw.githubusercontent.com/mksglu/context-mode/main/configs/codex/AGENTS.md -o ~/.codex/AGENTS.md
curl -sL https://raw.githubusercontent.com/mksglu/context-mode/main/configs/antigravity/GEMINI.md -o ~/.gemini/GEMINI.md

if command -v codex &>/dev/null; then
    echo "🧩 Installing Codex context-mode plugin..."
    codex plugin marketplace add mksglu/context-mode || true
fi
"""
