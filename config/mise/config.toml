[tools]
# --- Core Utilities ---
# ls
eza = "latest"
# cat
bat = "latest"
# grep
ripgrep = "latest"
# find
fd = "latest"
# cd
zoxide = "latest"
# top
"github:dalance/procs" = "latest"
# du
dust = "latest"
neovim = "latest"

# --- Text Processing & JSON ---
# fuzzy finder
fzf = "latest"
# JSON
jq = "latest"
# Git diff
delta = "latest"
# Git TUI
lazygit = "latest"

# --- Environment & Shell Managers ---
# shell history
atuin = { version = "latest", postinstall = "atuin import auto" }
# shell plugin manager
"github:rossmacarthur/sheldon" = "latest"
starship = "latest"

# --- Languages ---
node = "latest"
python = "latest"
go = "latest"
usage = "latest"
uv = "latest"
bun = "latest"

# --- AI Tools ---
"github:ogulcancelik/herdr" = "latest"
claude-code  = "latest"
codex        = "latest"
opencode     = "latest"
"github:yvgude/lean-ctx" = "latest"
"npm:context-mode" = "latest"
"npm:skills" = "latest"


[env]
STARSHIP_CONFIG = '{{env.HOME}}/.config/starship/starship.toml'

[settings]
# 開発機能の有効化（推奨）
experimental = true
# ツールインストール時の詳細表示
verbose = false
# asdfのプラグインショートカットを使用
plugin_autoupdate_last_check_duration = "1 week"

npm.package_manager = "bun"
