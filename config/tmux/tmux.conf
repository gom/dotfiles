# ==========================
# Base Settings
# ==========================
# True Color support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'  # undercurl support
set -as terminal-overrides ',*:Setrgb=\E[4:3\E[4::%p1%dm'  # underscore colors

# Enable mouse support
set -g mouse on

# Start window and pane numbering at 1
set -g base-index 1
set -g pane-base-index 1
set-option -g renumber-windows on

# Activity monitoring
setw -g monitor-activity on
set -g visual-activity off

# vi mode keys in copy mode
setw -g mode-keys vi

# Inject user bin and mise shims into tmux's global PATH (Portable)
run-shell 'tmux set-environment -g PATH "$HOME/.local/share/mise/shims:$HOME/.local/bin:$HOME/bin:$PATH"'

# Default shell (dynamically find zsh)
# Note: The commands below are evaluated sequentially. The last successful assignment wins.
set-option -g default-shell /bin/zsh
if-shell "test -x /usr/bin/zsh" "set-option -g default-shell /usr/bin/zsh"
if-shell "test -x /usr/local/bin/zsh" "set-option -g default-shell /usr/local/bin/zsh"
if-shell "test -x /opt/homebrew/bin/zsh" "set-option -g default-shell /opt/homebrew/bin/zsh"

# ==========================
# Theme & UI Settings
# ==========================
# Move status bar to the top
set-option -g status-position top

# --- Catppuccin (Mocha) - No Nerd Fonts ---
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style "rounded"

# Disable icon requirements by replacing default separators and text
set -g @catppuccin_window_left_separator " "
set -g @catppuccin_window_right_separator " "
set -g @catppuccin_window_middle_separator " | "
set -g @catppuccin_window_number_position "right"
set -g @catppuccin_window_default_text "#W"
set -g @catppuccin_window_current_text "#W"

# Set ASCII icons for status modules to avoid tofu/missing characters
set -g @catppuccin_directory_icon ">"
set -g @catppuccin_user_icon "@"
set -g @catppuccin_host_icon "H"
set -g @catppuccin_session_icon "S"
set -g @catppuccin_date_time_icon "T"

# Add more information to the right status bar (Catppuccin v1+ style)
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_directory}"
set -ag status-right "#{E:@catppuccin_status_user}"
set -ag status-right "#{E:@catppuccin_status_host}"
set -ag status-right "#{E:@catppuccin_status_date_time}"
set -ag status-right "#{E:@catppuccin_status_session}"

# ==========================
# Key Bindings
# ==========================
# --- Prefix ---
set -g prefix C-t
unbind C-b
bind t send-prefix

# --- Window Management ---
# Screen-like window creation/navigation
bind ^C new-window
bind ^@ next-window
bind ^N next-window
bind ^H previous-window
bind ^P previous-window
bind BSpace previous-window
bind ^A last-window
bind A command-prompt "rename-window %%"
bind K confirm-before "kill-window"

# --- Pane Management ---
bind | split-window -h
bind S split-window -v
bind k confirm-before "kill-pane"
bind Tab select-pane -t:.+
bind BTab select-pane -t:.-

# Fast resize with Prefix + H/J/K/L
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Meta(Alt) key navigation without prefix
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D
bind -n M-S-Left previous-window
bind -n M-S-Right next-window

# Synchronize panes
bind e setw synchronize-panes on \; display-message "✨ Panes Synchronized"
bind E setw synchronize-panes off \; display-message "👀 Panes Unsynchronized"

# --- Copy Mode ---
bind -r ^"[" copy-mode
bind -r ^] paste-buffer
# Vim-like selection keys
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle

# --- App & Features ---
# popup scratchpad
bind g popup -d '#{pane_current_path}' -E -w 80% -h 80%

# detach
bind ^D detach

# reload config
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded..."

# ==========================
# Plugins (TPM)
# ==========================

# Auto-install TPM if it is not installed
setenv -g TMUX_PLUGIN_MANAGER_PATH "$HOME/.tmux/plugins"
if "test ! -d $HOME/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm $HOME/.tmux/plugins/tpm && $HOME/.tmux/plugins/tpm/bin/install_plugins'"

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Workflow & Navigation
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'laktak/extrakto'

# Themes
set -g @plugin 'catppuccin/tmux'

# Plugin Options
set -g @continuum-restore 'on' # Auto restore session on tmux start

# Initialize TPM (must be at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
