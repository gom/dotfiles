# ==========================
# Base Settings
# ==========================
# True Color support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Enable mouse support
set -g mouse on

# Enable focus events for Neovim
set -g focus-events on

# Start window and pane numbering at 1
set -g base-index 1
set -g pane-base-index 1
set-option -g renumber-windows on

# vi mode keys in copy mode
setw -g mode-keys vi

# Default shell (dynamically find zsh)
# Note: The commands below are evaluated sequentially. The last successful assignment wins.
set-option -g default-shell /bin/zsh
if-shell "test -x /usr/bin/zsh" "set-option -g default-shell /usr/bin/zsh"
if-shell "test -x /usr/local/bin/zsh" "set-option -g default-shell /usr/local/bin/zsh"
if-shell "test -x /opt/homebrew/bin/zsh" "set-option -g default-shell /opt/homebrew/bin/zsh"

# ==========================
# Key Bindings (Screen-like)
# ==========================
# Prefix key: C-t
set -g prefix C-t
unbind C-b
bind t send-prefix

# Screen-like bindings
# new-window: c / C-c
unbind ^C
bind ^C new-window
unbind c
bind c new-window

# detach: d / C-d
unbind ^D
bind ^D detach

# next-window: n / C-n / C-@
unbind ^@
bind ^@ next-window
unbind ^N
bind ^N next-window
unbind n
bind n next-window

# previous-window: p / C-p / C-h / BSpace
unbind ^H
bind ^H previous-window
unbind ^P
bind ^P previous-window
unbind p
bind p previous-window
unbind BSpace
bind BSpace previous-window

# rename-window: A
unbind A
bind A command-prompt "rename-window %%"

# last-window: C-a
unbind ^A
bind ^A last-window

# kill-window / kill-pane: K / k
unbind K
bind K confirm-before "kill-window"
unbind k
bind k confirm-before "kill-pane"

# split-window: | (vertical), S (horizontal screen-like)
unbind |
bind | split-window -h
unbind S
bind S split-window -v

# pane traversal: Tab / BTab
unbind Tab
bind Tab select-pane -t:.+
unbind BTab
bind BTab select-pane -t:.-

# copy mode / paste
unbind ^"["
bind -r ^"[" copy-mode
unbind ^]
bind -r ^] paste-buffer

# reload config
unbind r
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded..."

# ==========================
# Plugins (TPM)
# ==========================

# Auto-install TPM if it is not installed
setenv -g TMUX_PLUGIN_MANAGER_PATH "$HOME/.tmux/plugins"
if "test ! -d $HOME/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm $HOME/.tmux/plugins/tpm && $HOME/.tmux/plugins/tpm/bin/install_plugins'"

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'seebi/tmux-colors-solarized'

# Plugin settings
set -g @colors-solarized '256'

# Initialize TPM (must be at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
